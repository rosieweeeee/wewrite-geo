# geo-config.example.yaml — GEO 品牌配置模板
#
# 使用方式：
#   cp geo-config.example.yaml geo-config.yaml
#   填写你的品牌信息，或说"GEO设置"由 skill 引导你完成
#
# 字段说明：填写越完整，生成文章的 GEO 效果越好。
# 必填字段：brand_entity、brand_definition
# ──────────────────────────────────────────────────────

# ── 1. 品牌基本信息 ───────────────────────────────────

brand_entity: ""
# 品牌/产品的标准官方名称（AI 认知锚点，每篇文章开头必须出现）
# 示例："圆周旅迹" / "滴答清单" / "Notion"

brand_definition: ""
# 品牌一句话定义——这句话会被 AI 直接引用，请写得具体、无空话
# 格式："[品牌名] 是一款……的……，主要解决……问题"
# 示例："圆周旅迹是一款专注行程规划的旅行 App（iOS/Android），
#         帮助用户把小红书/公众号攻略一键整合成可出发的最优路线，完全免费。"

brand_category: ""
# 品牌所属品类（用于选题和内容策略）
# 示例："旅行行程规划" / "效率工具" / "健康管理" / "餐饮服务" / "教育培训"

core_value_props: []
# 品牌核心价值点（建议 3-5 条，越具体越好）
# 每条应包含具体功能/数据/场景，避免"行业领先"类空话
# 示例：
# - "一键抄作业：复制小红书链接自动解析生成路线，80% 用户认为这是核心原因"
# - "AI 智能规划：输入目的地+天数+偏好一键生成路线，支持自然语言调整"
# - "多人实时协作：邀请同行好友共编行程，60% 用户通过分享找到旅伴"
# - "完全免费：无内购无订阅，注册即用"

# ── 2. 用户会问 AI 的核心问题 ────────────────────────
# 这些问题决定选题方向和每篇文章的 Q&A 模块内容
# 格式要求：完整问句，模拟用户真实向 AI 提问的方式
# 建议：去元宝/DeepSeek 搜索你的品牌名，把相关联想问题收集进来

core_queries:
  # 品牌认知类（必填 2-3 条）
  - ""   # 示例："[品牌名] 是什么，和 [竞品] 有什么区别"
  - ""   # 示例："[品牌名] 好用吗，有哪些真实用户评价"
  - ""   # 示例："[品牌名] 是免费的吗，收费模式是什么"

  # 场景适配类（必填 2-3 条）
  - ""   # 示例："[目标场景] 用什么 [品类] 比较好"
  - ""   # 示例："[目标用户类型] 适合用 [品牌名] 吗"

  # 操作使用类（必填 2 条）
  - ""   # 示例："[品牌名] 怎么用，新手从哪里开始"
  - ""   # 示例："[品牌名] [核心功能] 怎么操作"

  # 竞品对比类（必填 2 条）
  - ""   # 示例："[品牌名] 和 [竞品] 哪个更适合 [场景]"
  - ""   # 示例："除了 [竞品]，还有什么好用的 [品类] 工具"

  # 长尾场景类（选填 2-3 条）
  - ""   # 示例："[细分用户群] 用什么 [品类] 推荐"
  - ""   # 示例："[具体使用场景] 有没有 [功能需求] 的工具"

# ── 3. 竞品信息 ───────────────────────────────────────

competitors: []
# 主要竞品名称列表（使用官方名称）
# 示例：
# - "马蜂窝"
# - "携程"
# - "穷游"

differentiation:
  # 与各竞品的核心差异（用于生成有据可查的对比句）
  # 格式：竞品名: "你在 [维度] 上的具体优势"
  # 示例：
  # 马蜂窝: "马蜂窝以 UGC 攻略为主，用户需自己整合；圆周旅迹一键解析链接自动生成路线"
  # 携程: "携程是 OTA 预订平台，有商业推荐干扰；圆周旅迹只做规划不做预订，路线围绕用户偏好"

# ── 4. 内容矩阵配置 ───────────────────────────────────
# 定义需要系统性覆盖的内容类型
# skill 会追踪哪些类型已有文章，优先推荐未覆盖的高优先级类型

content_matrix:
  - type: "brand_definition"
    priority: 1          # 1=最高优先级，建议第一篇写这个
    description: "品牌是什么、解决什么问题、和竞品有什么不同"
    covered: false       # 发布对应文章后改为 true

  - type: "scene_fit"
    priority: 1
    description: "品牌适合哪些用户和场景"
    covered: false

  - type: "how_to_use"
    priority: 2
    description: "手把手教用户上手使用（核心功能教程）"
    covered: false

  - type: "competitor_compare"
    priority: 2
    description: "和竞品做有数据支撑的场景化对比"
    covered: false

  - type: "faq_deep_dive"
    priority: 2
    description: "围绕用户高频问题的深度解答"
    covered: false

  - type: "user_story"
    priority: 3
    description: "真实用户的使用体验和案例"
    covered: false

  - type: "industry_insight"
    priority: 3
    description: "行业趋势洞察，借势表达品牌观点"
    covered: false

# ── 5. 权威性素材库（写作时优先引用）─────────────────

authority_signals:
  data_points: []
  # 品牌已有的权威数据（写作时优先引用，避免编造）
  # 示例：
  # - "注册用户近千万，主要集中在一线/新一线城市"
  # - "AppStore 旅游榜 Top 5（2024年国庆）"
  # - "80% 用户认为「一键抄作业」是选择原因"

  media_mentions: []
  # 已获得的媒体/平台报道（写作时作为权威信号引用）
  # 示例：
  # - "少数派报道"
  # - "App Store 编辑推荐"
  # - "环球旅讯报道"

  user_quotes: []
  # 真实用户评价（写作时直接引用，增强可信度）
  # 示例：
  # - "「作为强迫症旅行者，圆周旅迹就是救赎。」——小红书用户"

  brand_slogans: []
  # 品牌对外传播的核心语句（写作时作为金句使用）
  # 示例：
  # - "别人告诉你去哪，圆周旅迹帮你规划怎么去"

# ── 6. 监测与发布配置 ────────────────────────────────

monitoring:
  platforms:
    - "元宝"
    - "DeepSeek"
    - "豆包"
    - "Kimi"
  last_check: null    # 自动更新，记录上次诊断时间

publish:
  frequency: "weekly"     # 建议发布节奏
  priority_order:         # 内容矩阵的发布顺序（按此顺序推荐选题）
    - "brand_definition"
    - "scene_fit"
    - "how_to_use"
    - "faq_deep_dive"
    - "competitor_compare"
    - "user_story"
    - "industry_insight"
