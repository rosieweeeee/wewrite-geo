<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
</head>
<body style="margin:0;padding:0;background:#fff;">

<section style="max-width:680px;margin:0 auto;background:#fff;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;">

  <!-- 深色封面头部 -->
  <section style="background:#1a1a1a;padding:36px 28px 32px;">
    <!-- 标签 -->
    <div style="margin-bottom:16px;">
      <span style="display:inline-block;background:#c4602a;color:#fff;font-size:10px;letter-spacing:0.15em;padding:4px 12px;border-radius:2px;">{{CATEGORY}}</span>
    </div>
    <!-- 阅读提示 -->
    <div style="font-size:11px;color:#666;margin-bottom:16px;letter-spacing:0.05em;">
      📖 全文约{{WORD_COUNT}}字 &nbsp;·&nbsp; 预计阅读{{READ_MIN}}分钟
    </div>
    <!-- 标题 -->
    <h1 style="font-size:24px;line-height:1.6;color:#ffffff;font-weight:bold;margin:0 0 16px;letter-spacing:0.01em;">{{TITLE}}</h1>
    <!-- 发布信息 -->
    <div style="font-size:11px;color:#666;letter-spacing:0.05em;">圆周旅迹 · {{DATE}}</div>
  </section>

  <!-- 文章正文 -->
  <section style="padding:32px 28px 40px;">
    {{BODY}}
  </section>

  <!-- 文章结尾 -->
  <section style="margin:0 28px;padding:24px 0;border-top:1px solid #e0e0e0;font-size:12px;color:#999;line-height:1.8;text-align:center;">
    <p>— 本文完 —</p>
    <p style="margin-top:6px;">本文图片由AI辅助生成。</p>
  </section>

</section>

</body>
</html>
