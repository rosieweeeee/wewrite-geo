<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
</head>
<body style="margin:0;padding:0;background:#faf9f7;">

<section style="max-width:680px;margin:0 auto;background:#faf9f7;font-family:'Songti SC',STSong,Georgia,serif;">

  <!-- 阅读提示 -->
  <section style="margin:0;padding:14px 24px;background:#f0ede8;font-size:12px;color:#b0a898;line-height:1.8;text-align:center;letter-spacing:0.05em;font-family:-apple-system,'PingFang SC',sans-serif;">
    📖 全文约{{WORD_COUNT}}字 &nbsp;·&nbsp; 预计阅读{{READ_MIN}}分钟
  </section>

  <!-- 文章头部 -->
  <section style="padding:40px 28px 32px;border-bottom:1px solid #e0dcd8;">
    <div style="font-size:10px;color:#b0a898;letter-spacing:0.3em;margin-bottom:16px;font-family:-apple-system,'PingFang SC',sans-serif;">{{CATEGORY}}</div>
    <h1 style="font-size:24px;line-height:1.6;color:#2a2520;font-weight:normal;margin:0 0 16px;">{{TITLE}}</h1>
    <div style="font-size:11px;color:#b0a898;letter-spacing:0.05em;font-family:-apple-system,'PingFang SC',sans-serif;">圆周旅迹 · {{DATE}}</div>
  </section>

  <!-- 文章正文 -->
  <section style="padding:32px 28px 40px;">
    {{BODY}}
  </section>

  <!-- 文章结尾 -->
  <section style="margin:0 28px;padding:24px 0;border-top:1px solid #e0dcd8;font-size:12px;color:#b0a898;line-height:1.8;text-align:center;font-family:-apple-system,'PingFang SC',sans-serif;">
    <p>— 本文完 —</p>
    <p style="margin-top:6px;">本文图片由AI辅助生成。</p>
  </section>

</section>

</body>
</html>
