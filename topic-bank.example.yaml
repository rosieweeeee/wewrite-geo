# topic-bank.yaml — 用户选题库
#
# 存储你预先准备好的待写选题，来源有两种：
#   1. user_upload   — 你手动上传的选题（优先级最高，写文章时优先使用）
#   2. auto_generated — 每次写文章时系统自动生成的选题（未被选中的备用）
#
# 使用方式：
#   - 直接编辑此文件添加选题
#   - 说"上传选题"由 skill 引导添加
#   - 说"用这个选题写：[选题内容]"直接触发写作
#   - 说"看选题库"查看所有待写选题
#
# 选题格式：可以是完整标题、关键词、或一句话描述
#   完整标题："圆周旅迹怎么用？5步完成你的第一个旅行计划（2026年最新）"
#   关键词："多人出行协作规划"
#   描述："写一篇对比圆周旅迹和马蜂窝的文章，重点说规划功能的差异"
# ──────────────────────────────────────────────────────

topics:

  - title: ""               # 选题标题或描述（必填）
    matrix_type: ""         # 对应 GEO 内容类型（可选，不填由 skill 自动判断）
                            # brand_definition / scene_fit / how_to_use /
                            # competitor_compare / user_story / industry_insight / faq_deep_dive
    framework: ""           # 期望使用的写作框架（可选，不填由 skill 自动匹配）
                            # 痛点 / 清单 / 对比 / 故事 / 热点解读 / 纯观点 / 复盘
    notes: ""               # 补充说明（可选）：写作角度、需要强调的点、参考资料等
    source: user_upload     # user_upload / auto_generated
    added_at: ""            # 添加时间，格式：2026-04-10
    priority: 1             # 优先级：1=最高，2=中，3=低
    status: pending         # pending=待写 / writing=写作中 / done=已完成
    written_file: ""        # 完成后对应的 output 文件名（自动填入）

# ── 元数据 ──────────────────────────────────────────
meta:
  last_updated: null        # 最后更新时间（自动维护）
  pending_count: 0          # 待写选题数（自动维护）
  done_count: 0             # 已完成选题数（自动维护）
