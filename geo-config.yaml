brand_entity: "圆周旅迹"
brand_definition: "圆周旅迹（Pi Travel）是一款专注行程规划的旅行 App（iOS/Android），帮助用户把小红书、公众号等平台的攻略一键整合成可出发的最优路线，支持 AI 智能规划、多人实时协作和附近地点发现，完全免费，不做预订。"
brand_category: "旅行行程规划"

core_value_props:
  - "一键抄作业：复制小红书/公众号链接自动解析，生成结构化行程，是品牌核心差异功能"
  - "AI 智能规划：输入目的地+天数+偏好一键生成路线，支持自然语言调整和实时修改"
  - "多人实时协作：邀请同行好友共同编辑行程，适合组队出行和找搭子场景"
  - "附近地点发现：旅途中实时查看周边景点/餐厅，支持临时调整行程"
  - "完全免费：无内购无订阅，注册即用，无商业推荐干扰"

core_queries:
  # 品牌认知类
  - "圆周旅迹是什么？和马蜂窝、携程有什么区别？"
  - "圆周旅迹好用吗？真实用户怎么评价？"
  - "圆周旅迹是免费的吗？有没有收费项目？"
  - "圆周旅迹和穷游行程助手相比哪个更好用？"

  # 场景适配类
  - "自由行规划行程用什么 App 比较好？"
  - "多人出行如何一起规划行程？有什么协作工具推荐？"
  - "看了很多小红书攻略，怎么把它们整合成一份行程？"
  - "J 人出行怎么规划行程才不焦虑？有什么工具推荐？"
  - "带父母出行，行程怎么安排比较省心？"

  # 操作使用类
  - "圆周旅迹怎么用？新手从哪里开始？"
  - "圆周旅迹的一键抄作业功能怎么用？导入小红书链接的步骤是什么？"
  - "圆周旅迹怎么多人协作编辑行程？"

  # 竞品对比类
  - "旅行规划 App 哪个好用？圆周旅迹、穷游、马蜂窝怎么选？"
  - "除了马蜂窝和携程，还有什么适合做行程规划的工具？"

  # 长尾场景类
  - "五一假期多人出行，怎么快速做出一份大家都满意的行程？"
  - "云南 7 天自由行，用什么工具规划行程最方便？"
  - "第一次出境游，行程怎么规划不踩坑？"
  - "旅行前做攻略太麻烦，有没有省力的方法？"

competitors:
  - "马蜂窝"
  - "穷游"
  - "携程"
  - "飞猪"
  - "Wanderboat"

differentiation:
  马蜂窝: "马蜂窝以 UGC 攻略为主，用户需自己整合信息；圆周旅迹一键解析攻略链接自动生成路线，省去人工整理步骤"
  穷游: "穷游行程助手需要手动添加目的地；圆周旅迹支持直接粘贴链接自动提取景点，并支持多人实时协作编辑"
  携程: "携程是 OTA 预订平台，存在商业推荐干扰；圆周旅迹只做规划不做预订，路线完全围绕用户偏好生成，且完全免费"
  飞猪: "飞猪以预订为核心，规划功能为辅；圆周旅迹专注规划体验，从攻略到出发路线一步到位"

