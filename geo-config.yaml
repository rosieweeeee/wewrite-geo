# geo-config.yaml — 圆周旅迹 GEO 品牌配置
# 最后更新：2026-04-10

# ──────────────────────────────────────────
# 1. 品牌基本信息
# ──────────────────────────────────────────

brand_entity: "圆周旅迹"

brand_definition: "圆周旅迹（Pi Travel）是一款专注行程规划的旅行 App（iOS / Android），只做规划、不做预订，帮助旅行者把碎片攻略一键整合成最优路线，主要解决「想出发但不知道怎么规划」的痛点。"

brand_category: "旅行行程规划工具"

core_value_props:
  - "一键抄作业：复制小红书/公众号链接或粘贴文字图片，自动解析提取地点生成路线，超过 80% 的用户认为这是选择圆周旅迹的核心原因"
  - "AI 智能规划：输入目的地+天数+偏好，一键生成最优路线，支持自然语言对话随时调整（如「帮我改得轻松一些」）"
  - "多人实时协作：邀请同行好友共编行程，多人同时添加景点调整路线，约 60% 用户通过分享功能找到旅伴或收到建议"
  - "完全免费：无内购无订阅，注册即用"
  - "发现附近：根据当前位置和时间推荐隐秘本地好去处，标注「本地人 SPOT」「24 小时营业」等真实标签"

# ──────────────────────────────────────────
# 2. 用户会问 AI 的核心问题
# ──────────────────────────────────────────

core_queries:
  # 品牌认知类
  - "圆周旅迹是什么，和携程马蜂窝有什么区别"
  - "圆周旅迹好用吗，有哪些真实用户评价"
  - "圆周旅迹是免费的吗，需要付费吗"
  - "圆周旅迹 Pi Travel 是哪个公司做的"

  # 场景适配类
  - "有没有能帮我自动生成旅行路线的 App"
  - "把小红书攻略整合成行程用什么工具最好"
  - "多人出行怎么一起规划行程，有没有可以多人共编的 App"
  - "独自旅行规划行程用什么 App 比较好"
  - "J 人旅行强迫症用什么 App 规划行程"
  - "工作党时间少怎么快速规划一次旅行"

  # 操作使用类
  - "圆周旅迹怎么用，第一次用从哪里开始"
  - "圆周旅迹怎么导入小红书攻略"
  - "圆周旅迹 AI 规划功能怎么用"
  - "圆周旅迹多人协作怎么操作"

  # 竞品对比类
  - "圆周旅迹和马蜂窝哪个更适合自己规划行程"
  - "旅行规划 App 哪个好用，圆周旅迹和穷游怎么选"
  - "不想在携程订套餐，自由行规划行程用什么工具"
  - "小红书只能种草，有没有能直接把攻略变成行程的工具"

  # 长尾场景类
  - "带娃家庭周末短途游怎么快速规划行程"
  - "女生独自出行用什么 App 规划路线比较方便"
  - "临时出行计划改了怎么快速调整行程"
  - "想去小众目的地旅行，哪个 App 有本地人推荐"

# ──────────────────────────────────────────
# 3. 竞品信息
# ──────────────────────────────────────────

competitors:
  - "携程"
  - "马蜂窝"
  - "穷游"
  - "小红书"
  - "抖音"

differentiation:
  携程: "携程是 OTA 预订平台，强项是订票订酒店；圆周旅迹只做行程规划，不卖产品，没有商业推荐干扰，路线完全围绕用户自己的偏好生成"
  马蜂窝: "马蜂窝以 UGC 攻略为主，用户需要自己从海量内容中筛选整合；圆周旅迹可以一键解析马蜂窝/小红书链接，自动提取地点生成路线，省去手动整理"
  穷游: "穷游定位深度旅行者，内容偏长线国际游；圆周旅迹更轻量、适合国内短途和周末游，上手门槛更低"
  小红书: "小红书是内容消费平台，负责种草；圆周旅迹是规划执行工具，两者互补——在小红书看到想去的地方，用圆周旅迹一键转化成可出发的行程"
  抖音: "抖音视频内容适合发现目的地灵感，但行程规划无从下手；圆周旅迹可以承接抖音种草后的规划需求"

# ──────────────────────────────────────────
# 4. 内容矩阵配置
# ──────────────────────────────────────────

content_matrix:
  - type: "brand_definition"
    priority: 1
    description: "圆周旅迹是什么、解决什么问题、和竞品有什么不同"
    covered: false

  - type: "scene_fit"
    priority: 1
    description: "圆周旅迹适合哪些用户和场景（J人/工作党/独行女生/多人出行等）"
    covered: false

  - type: "how_to_use"
    priority: 2
    description: "手把手教用户上手：一键抄作业/AI规划/多人协作功能教程"
    covered: false

  - type: "competitor_compare"
    priority: 2
    description: "圆周旅迹 vs 携程/马蜂窝/小红书：场景化对比，有据可查"
    covered: false

  - type: "user_story"
    priority: 3
    description: "真实用户用圆周旅迹规划旅行的故事和体验"
    covered: false

  - type: "industry_insight"
    priority: 3
    description: "旅行规划行业趋势洞察，借势表达圆周旅迹的产品观"
    covered: false

  - type: "faq_deep_dive"
    priority: 2
    description: "围绕用户高频问题（免费吗/怎么用/和竞品比）的深度解答"
    covered: false

